<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sem conexão · VendasApp</title>
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <meta name="theme-color" content="#0f172a" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon-wrap {
      width: 80px; height: 80px;
      border-radius: 20px;
      background: #2563eb;
      box-shadow: 0 10px 30px rgba(37, 99, 235, 0.35);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
    }
    .icon-wrap img { width: 48px; height: 48px; }
    h1 {
      margin: 0 0 12px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    p {
      margin: 0 0 8px;
      color: #cbd5e1;
      max-width: 380px;
      line-height: 1.55;
      font-size: 15px;
    }
    .hint {
      margin-top: 4px;
      color: #94a3b8;
      font-size: 13px;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 28px;
    }
    a.btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: background 120ms ease;
    }
    a.primary {
      background: #2563eb;
      color: white;
    }
    a.primary:hover { background: #1d4ed8; }
    a.ghost {
      background: rgba(148, 163, 184, 0.1);
      color: #e2e8f0;
      border: 1px solid rgba(148, 163, 184, 0.25);
    }
    a.ghost:hover { background: rgba(148, 163, 184, 0.18); }
    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(249, 115, 22, 0.12);
      color: #fdba74;
      border: 1px solid rgba(249, 115, 22, 0.3);
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 24px;
    }
    .status-chip::before {
      content: "";
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #f97316;
    }
  </style>
</head>
<body>
  <div class="icon-wrap">
    <img src="/icon-192.png" alt="VendasApp" />
  </div>
  <span class="status-chip">Você está offline</span>
  <h1>Esta página precisa de conexão</h1>
  <p>
    A página que você tentou abrir ainda não foi sincronizada para uso offline.
  </p>
  <p class="hint">
    O <strong>PDV</strong> continua funcionando — bipes e buscas usam os produtos
    sincronizados na última vez que você esteve online.
  </p>
  <div class="actions">
    <a class="btn primary" href="/vendas/nova">Ir para o PDV</a>
    <a class="btn ghost" href="javascript:location.reload()">Tentar novamente</a>
  </div>
</body>
</html>
